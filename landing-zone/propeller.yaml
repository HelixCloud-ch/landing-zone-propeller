# Propeller default pipeline definition.
# Stages run sequentially. Steps within a stage run in parallel
# unless constrained by depends_on.

version: "1"
namespace: landing-zone

stages:
  - name: foundation
    steps:
      - project: bootstrap-parameters
        target: management
        inputs:
          - name: /accounts.operations.id
            var: operations_account_id
        outputs:
          - name: portfolio_id
            var: portfolio_id
          - name: product_id
            var: product_id
          - name: artifact_id
            var: artifact_id
          - name: s3_source_bucket
            var: s3_source_bucket
          - name: autopilot_role_arn
            var: autopilot_role_arn

      - project: control-tower-prerequisites
        target: management
        outputs:
          - name: /accounts.log-archive.id
            var: log_archive_account_id
          - name: /accounts.audit.id
            var: audit_account_id
          - name: /accounts.backup-admin.id
            var: backup_admin_account_id
          - name: /accounts.backup-central.id
            var: backup_central_account_id
          - name: security_ou_id
          - name: control_tower_admin_role_arn
          - name: control_tower_cloudtrail_role_arn
          - name: control_tower_stackset_role_arn
          - name: control_tower_config_aggregator_role_arn

      - project: org-trusted-access
        target: management

      - project: control-tower
        target: management
        depends_on: [control-tower-prerequisites]
        inputs:
          - name: /accounts.log-archive.id
            var: log_archive_account_id
          - name: /accounts.audit.id
            var: security_tooling_account_id
          - name: /accounts.backup-admin.id
            var: backup_admin_account_id
          - name: /accounts.backup-central.id
            var: backup_central_account_id

      - project: ou-infrastructure
        target: management
        depends_on: [control-tower]
        inputs:
          - name: /accounts.operations.id
            var: operations_account_id
        outputs:
          - name: infrastructure_id
            var: ou_id
          - name: infrastructure_arn
            var: ou_arn
          - name: infrastructure_name
            var: ou_name

      - project: account-network
        target: management
        depends_on: [ou-infrastructure]
        inputs:
          - name: ou-infrastructure.infrastructure_id
            var: ou_id
          - name: ou-infrastructure.infrastructure_name
            var: ou_name
        outputs:
          - name: /accounts.network.id
            var: account_id

      - project: network-deploy-runner
        target: management
        depends_on: [account-network, bootstrap-parameters]
        inputs:
          - name: /accounts.network.id
            var: network_account_id
          - name: bootstrap-parameters.portfolio_id
            var: portfolio_id
          - name: bootstrap-parameters.product_id
            var: product_id
          - name: bootstrap-parameters.artifact_id
            var: provisioning_artifact_id
          - name: bootstrap-parameters.s3_source_bucket
            var: s3_source_bucket
          - name: /accounts.operations.id
            var: caller_account_id
          - name: bootstrap-parameters.autopilot_role_arn
            var: caller_arn

      - project: base-sso
        target: management

  - name: network
    steps:
      - project: network-tgw
        target: network
        depends_on: []
        outputs:
          - name: /network.tgw.id
            var: tgw_id
          - name: /network.tgw.arn
            var: tgw_arn
          - name: /network.tgw.share_arn
            var: tgw_share_arn
