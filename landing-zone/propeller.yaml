# Propeller default pipeline definition.
# Stages run sequentially. Steps within a stage run in parallel
# unless constrained by depends_on.

version: "1"
namespace: landing-zone

stages:
  - name: foundation
    steps:
      - project: bootstrap-parameters
        target: management
        inputs:
          - name: /accounts.operations.id
            var: operations_account_id
        outputs:
          - name: portfolio_id
            var: portfolio_id
          - name: product_id
            var: product_id
          - name: artifact_id
            var: artifact_id
          - name: s3_source_bucket
            var: s3_source_bucket
          - name: autopilot_role_arn
          - name: organization_id
            var: autopilot_role_arn

      - project: control-tower-prerequisites
        target: management
        outputs:
          - name: /accounts.log-archive.id
            var: log_archive_account_id
          - name: /accounts.audit.id
            var: audit_account_id
          - name: /accounts.backup-admin.id
            var: backup_admin_account_id
          - name: /accounts.backup-central.id
            var: backup_central_account_id
          - name: security_ou_id
          - name: control_tower_admin_role_arn
          - name: control_tower_cloudtrail_role_arn
          - name: control_tower_stackset_role_arn
          - name: control_tower_config_aggregator_role_arn

      - project: org-trusted-access
        target: management

      - project: control-tower
        target: management
        depends_on: [control-tower-prerequisites]
        inputs:
          - name: /accounts.log-archive.id
            var: log_archive_account_id
          - name: /accounts.audit.id
            var: security_tooling_account_id
          - name: /accounts.backup-admin.id
            var: backup_admin_account_id
          - name: /accounts.backup-central.id
            var: backup_central_account_id

      - project: ou-infrastructure
        target: management
        depends_on: [control-tower]
        inputs:
          - name: /accounts.operations.id
            var: operations_account_id
        outputs:
          - name: infrastructure_id
            var: ou_id
          - name: infrastructure_arn
            var: ou_arn
          - name: infrastructure_name
            var: ou_name

      - project: account-network
        target: management
        depends_on: [ou-infrastructure]
        inputs:
          - name: ou-infrastructure.infrastructure_id
            var: ou_id
          - name: ou-infrastructure.infrastructure_name
            var: ou_name
        outputs:
          - name: /accounts.network.id
            var: account_id

      - project: network-deploy-runner
        target: management
        depends_on: [account-network, bootstrap-parameters]
        inputs:
          - name: /accounts.network.id
            var: network_account_id
          - name: bootstrap-parameters.portfolio_id
            var: portfolio_id
          - name: bootstrap-parameters.product_id
            var: product_id
          - name: bootstrap-parameters.artifact_id
            var: provisioning_artifact_id
          - name: bootstrap-parameters.s3_source_bucket
            var: s3_source_bucket
          - name: /accounts.operations.id
            var: caller_account_id
          - name: bootstrap-parameters.autopilot_role_arn
            var: caller_arn

      - project: base-sso
        target: management

  - name: network
    steps:
      - project: network-tgw
        target: network
        depends_on: []
        outputs:
          - name: /network.tgw.id
            var: tgw_id
          - name: /network.tgw.arn
            var: tgw_arn
          - name: /network.tgw.share_arn
            var: tgw_share_arn

      - project: network-vpc-hub
        target: network
        depends_on: []
        outputs:
          - name: /network.vpc.id
            var: vpc_id
          - name: /network.vpc.cidr
            var: vpc_cidr
          - name: /network.nat.regional_id
            var: regional_nat_gateway_id
          - name: public_subnet_ids
          - name: private_subnet_ids
          - name: tgw_subnet_ids
          - name: resolver_subnet_ids
          - name: route_table_ids

      - project: network-s2s
        target: network
        depends_on: [network-tgw]
        inputs:
          - name: /network.tgw.id
            var: tgw_id
        outputs:
          - name: vpn_attachment_ids
          - name: vpn_connection_ids

      - project: network-routing
        target: network
        depends_on: [network-tgw, network-vpc-hub, network-s2s]
        inputs:
          - name: /network.tgw.id
            var: tgw_id
          - name: /network.vpc.id
            var: hub_vpc_id
          - name: /network.vpc.cidr
            var: hub_vpc_cidr
          - name: /network.nat.regional_id
            var: regional_nat_gateway_id
          - name: network-vpc-hub.tgw_subnet_ids
            var: hub_tgw_subnet_ids
          - name: network-vpc-hub.route_table_ids
            var: hub_route_table_ids
          - name: network-s2s.vpn_attachment_ids
            var: vpn_attachment_ids
        outputs:
          - name: tgw_route_table_id
          - name: hub_attachment_id
          - name: onprem_cidrs

  - name: workloads
    steps:
      - project: workload-ous
        target: management
        outputs:
          - name: ou_ids
            var: ou_ids

      - project: workload-accounts
        target: management
        depends_on: [workload-ous]
        inputs:
          - name: workload-ous.ou_ids
            var: ou_ids
        outputs:
          - name: account_ids

      - project: workload-deploy-runners
        target: management
        depends_on: [workload-accounts]
        inputs:
          - name: workload-accounts.account_ids
            var: account_ids
          - name: bootstrap-parameters.portfolio_id
            var: portfolio_id
          - name: bootstrap-parameters.product_id
            var: product_id
          - name: bootstrap-parameters.artifact_id
            var: provisioning_artifact_id
          - name: bootstrap-parameters.s3_source_bucket
            var: s3_source_bucket
          - name: bootstrap-parameters.autopilot_role_arn
            var: caller_arn
          - name: /accounts.operations.id
            var: caller_account_id

      - project: workload-account-registry
        target: operations
        depends_on: [workload-deploy-runners]
        inputs:
          - name: workload-accounts.account_ids
            var: account_ids

      - project: workload-parameters
        target: management
        depends_on: [workload-deploy-runners]
        inputs:
          - name: bootstrap-parameters.organization_id
            var: organization_id
          - name: workload-ous.ou_ids
            var: ou_ids
          - name: workload-accounts.account_ids
            var: account_ids
          - name: /network.tgw.id
            var: tgw_id
          - name: /network.tgw.arn
            var: tgw_arn
          - name: /network.tgw.share_arn
            var: tgw_share_arn
        outputs:
          - name: organization_id
          - name: ou_ids
          - name: account_ids
          - name: tgw_id
          - name: tgw_arn
          - name: tgw_share_arn
