name: workload-deploy-runners
description:
  Provisions the deploy-runner Service Catalog product into each workload
  account.

metadata:
  cost-center: landing-zone

deploy:
  type: terraform
  terraform:
    backend:
      bucket: "state-iac-${AWS_ACCOUNT_ID}-${AWS_REGION}-an"
      key: "propeller/${PROPELLER_NAMESPACE}/${PROJECT_NAME}/terraform.tfstate"
      region: "${AWS_REGION}"
