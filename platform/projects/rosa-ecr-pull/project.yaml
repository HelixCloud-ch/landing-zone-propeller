name: rosa-ecr-pull
description:
  Attaches ECR pull permissions to the ROSA HCP worker node IAM role for
  cross-account image pull.

metadata:
  cost-center: platform

deploy:
  type: terraform
  terraform:
    backend:
      bucket: "state-iac-${AWS_ACCOUNT_ID}-${AWS_REGION}-an"
      key: "propeller/${PROPELLER_NAMESPACE}/${PROJECT_NAME}/terraform.tfstate"
      region: "${AWS_REGION}"

sleep:
  action: destroy
