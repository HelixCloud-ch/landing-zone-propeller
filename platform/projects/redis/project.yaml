name: redis
description: >-
  Deploys an ElastiCache Redis (Valkey engine) replication group with
  encryption, optional AUTH token, and configurable replicas.

metadata:
  cost-center: platform

deploy:
  type: terraform
  terraform:
    backend:
      bucket: "state-iac-${AWS_ACCOUNT_ID}-${AWS_REGION}-an"
      key: "propeller/${PROPELLER_NAMESPACE}/${PROJECT_NAME}/terraform.tfstate"
      region: "${AWS_REGION}"
