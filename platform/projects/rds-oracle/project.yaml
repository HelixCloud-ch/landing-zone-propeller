name: rds-oracle
description: >-
  Deploys an RDS Oracle instance with managed credentials (Secrets Manager),
  encryption at rest, and configurable networking.

metadata:
  cost-center: platform

deploy:
  type: terraform
  terraform:
    backend:
      bucket: "state-iac-${AWS_ACCOUNT_ID}-${AWS_REGION}-an"
      key: "propeller/${PROPELLER_NAMESPACE}/${PROJECT_NAME}/terraform.tfstate"
      region: "${AWS_REGION}"

sleep:
  action: command
  command: |
    aws rds stop-db-instance \
      --db-instance-identifier ${TF_OUTPUT_db_instance_identifier} \
      --region ${AWS_REGION} || true
  wake_command: |
    aws rds start-db-instance \
      --db-instance-identifier ${TF_OUTPUT_db_instance_identifier} \
      --region ${AWS_REGION} || true
    aws rds wait db-instance-available \
      --db-instance-identifier ${TF_OUTPUT_db_instance_identifier} \
      --region ${AWS_REGION}
