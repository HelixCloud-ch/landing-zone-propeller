name: Dev Build Cleanup

on:
  # schedule:
  #   - cron: "0 3 * * 0" # Weekly, Sunday 3am UTC
  workflow_dispatch:
    inputs:
      delete_all:
        description: "Delete ALL dev pre-releases (ignore age)"
        type: boolean
        default: false
      max_age_days:
        description: "Max age in days (ignored if delete_all is true)"
        type: string
        default: "30"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete dev pre-releases
        env:
          GH_TOKEN: ${{ github.token }}
          DELETE_ALL: ${{ github.event.inputs.delete_all || 'false' }}
          MAX_AGE_DAYS: ${{ github.event.inputs.max_age_days || '30' }}
        run: |
          if [ "$DELETE_ALL" = "true" ]; then
            echo "Deleting ALL dev pre-releases"
            CUTOFF="9999-12-31T00:00:00Z"
          else
            CUTOFF=$(date -d "${MAX_AGE_DAYS} days ago" -u +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -v-${MAX_AGE_DAYS}d -u +%Y-%m-%dT%H:%M:%SZ)
            echo "Deleting dev pre-releases older than $CUTOFF"
          fi

          gh release list --repo ${{ github.repository }} --limit 100 --json tagName,isPrerelease,publishedAt \
            --jq '.[] | select(.isPrerelease) | select(.tagName | contains("-dev-")) | [.tagName, .publishedAt] | @tsv' \
            | while IFS=$'\t' read -r TAG DATE; do
                if [[ "$DATE" < "$CUTOFF" ]]; then
                  echo "Deleting $TAG ($DATE)"
                  gh release delete "$TAG" --repo ${{ github.repository }} --yes --cleanup-tag
                fi
              done
