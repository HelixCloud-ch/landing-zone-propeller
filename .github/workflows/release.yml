name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write VERSION file
        run: echo "${{ github.ref_name }}" > VERSION

      - name: Build archive
        run: |
          zip -r propeller-${{ github.ref_name }}.zip . \
            -x '.git/*' \
            -x '.github/*' \
            -x 'dist/*' \
            -x '*.venv/*' \
            -x '__pycache__/*'

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          files: propeller-${{ github.ref_name }}.zip
