name: Dev Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Find the nearest clean semver tag (exclude dev tags)
          TAG=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || echo "")
          if [ -z "$TAG" ]; then
            TAG="v0.0.0"
            AHEAD=$(git rev-list --count HEAD)
          else
            AHEAD=$(git rev-list --count "${TAG}..HEAD")
          fi
          SHA=$(git rev-parse --short HEAD)
          VERSION="${TAG}-dev-${AHEAD}-g${SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Write VERSION file
        run: echo "${{ steps.version.outputs.version }}" > VERSION

      - name: Build archive
        run: |
          zip -r propeller-${{ steps.version.outputs.version }}.zip . \
            -x '.git/*' \
            -x '.github/*' \
            -x 'dist/*' \
            -x '*.venv/*' \
            -x '__pycache__/*'

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            propeller-${{ steps.version.outputs.version }}.zip \
            --title "Dev: ${{ steps.version.outputs.version }}" \
            --notes "Dev build from \`${{ github.ref_name }}\` at ${{ github.sha }}" \
            --prerelease
