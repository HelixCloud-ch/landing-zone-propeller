name: Dev Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          VERSION=$(git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || echo "v0.0.0-0-g$(git rev-parse --short HEAD)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Write VERSION file
        run: echo "${{ steps.version.outputs.version }}" > VERSION

      - name: Build archive
        run: |
          zip -r propeller-${{ steps.version.outputs.version }}.zip . \
            -x '.git/*' \
            -x '.github/*' \
            -x 'dist/*' \
            -x '*.venv/*' \
            -x '__pycache__/*'

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            propeller-${{ steps.version.outputs.version }}.zip \
            --title "Dev: ${{ steps.version.outputs.version }}" \
            --notes "Dev build from \`${{ github.ref_name }}\` at ${{ github.sha }}" \
            --prerelease
